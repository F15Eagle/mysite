<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume // Architectural Layout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 100px 5%; max-width: 900px; margin: 0 auto; color: #111; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; margin-bottom: 40px; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #666; text-transform: uppercase; }
    .row { display: grid; grid-template-columns: 200px 1fr; margin-bottom: 30px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
    a { color: #111; text-decoration: none; font-weight: 600; }
</style>

<p class="mono"><a href="/index.html">← Back to Home</a></p>
<br><br>
<h1>My Resume</h1>

<div class="clean-pdf-embed">
    <iframe src="/assets%5CPrady%20Resume%20Full.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitW" 
            width="100%" 
            height="900px" 
            frameborder="0" 
            scrolling="no">
    </iframe>
</div>

<style>
    .clean-pdf-embed {
        width: 100%;
        margin-top: 1.5rem;
        border-radius: 4px;
        overflow: hidden;
        background: transparent;
    }

    .clean-pdf-embed iframe {
        display: block;
        border: none;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); /* Soft background lift */
    }
</style>
</body>
</html>
